name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  guards:
    name: Repo guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Single .git (no nested repos)
        run: |
          nested=$(find . -mindepth 2 -name .git -not -path './node_modules/*' || true)
          if [ -n "$nested" ]; then
            echo "::error::Nested .git found:"; echo "$nested"; exit 1
          fi
          echo "OK: exactly one .git at root"

      - name: No Prisma enum / native Json (SQLite ⇄ Postgres parity)
        run: |
          hits=$(grep -rEn '(^|[[:space:]])enum[[:space:]]|[[:space:]]Json([[:space:]]|\?|\[|$)' \
            --include=schema.prisma . || true)
          if [ -n "$hits" ]; then
            echo "::error::schema.prisma must not use 'enum' or native 'Json' (use String + shared unions):"
            echo "$hits"; exit 1
          fi
          echo "OK: no banned tokens in any schema.prisma"

  build:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm type-check
      - run: pnpm build

      - name: Smoke — `pingwatch start` boots, migrates, and listens
        run: |
          node apps/server/dist/cli.js start --data-dir /tmp/pw-ci --port 3001 &
          PID=$!
          ok=0
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:3001/api/health | grep -q '"status":"ok"'; then ok=1; break; fi
            sleep 1
          done
          kill "$PID" 2>/dev/null || true
          if [ "$ok" != "1" ]; then echo "::error::pingwatch start did not become healthy"; exit 1; fi
          echo "OK: pingwatch start migrated + listened + healthy"

  migrate-both:
    name: Migrate both providers (SQLite ⇄ Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: pw
          POSTGRES_DB: pingwatch
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pingwatch/db run generate
      - name: SQLite migrate deploy
        run: DATABASE_URL="file:/tmp/ci.db" pnpm --filter @pingwatch/db exec prisma migrate deploy
      - name: Postgres migrate deploy
        run: DATABASE_URL="postgresql://postgres:pw@localhost:5432/pingwatch" pnpm --filter @pingwatch/db exec prisma migrate deploy --config prisma.config.postgres.ts
